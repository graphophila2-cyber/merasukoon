<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sun Face</title>
  <style>
    :root{
      --bg-a:#fffdf4;
      --bg-b:#fff3c7;
      --bg-c:#ffd772;

      --sun-1:#fff1a0;
      --sun-2:#ffd95a;
      --sun-3:#ffc533;
      --sun-4:#f7ab17;

      --ray-1:#ffe17b;
      --ray-2:#ffbc2b;

      --face:#6f4b12;
      --face-soft:rgba(111,75,18,.14);

      --glow-1:rgba(255,214,98,.55);
      --glow-2:rgba(255,191,58,.28);
      --white:rgba(255,255,255,.34);
      --peach:rgba(255,145,104,.22);

      --ease-soft:cubic-bezier(.22,.72,.12,1);
      --ease-bounce:cubic-bezier(.18,.9,.2,1.18);
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 15%, #ffffff 0%, var(--bg-a) 22%, var(--bg-b) 54%, var(--bg-c) 100%);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      touch-action:none;
      user-select:none;
    }

    body{
      display:grid;
      place-items:center;
      position:relative;
    }

    .scene{
      position:relative;
      width:min(94vw, 760px);
      aspect-ratio:1/1;
      display:grid;
      place-items:center;
      isolation:isolate;
      filter:drop-shadow(0 40px 50px rgba(201,132,18,.16));
    }

    .back-glow,
    .mist,
    .front-halo{
      position:absolute;
      inset:0;
      border-radius:50%;
      pointer-events:none;
    }

    .back-glow{
      inset:13%;
      background:
        radial-gradient(circle, rgba(255,244,182,.92) 0%, rgba(255,223,118,.54) 28%, rgba(255,194,62,.18) 52%, rgba(255,194,62,0) 70%);
      filter:blur(10px);
      animation:backGlow 7s var(--ease-soft) infinite;
    }

    .mist{
      inset:18%;
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,.22), rgba(255,255,255,0) 44%),
        radial-gradient(circle at 70% 70%, rgba(255,201,107,.20), rgba(255,201,107,0) 46%);
      filter:blur(18px);
      opacity:.9;
      animation:mistFloat 10s var(--ease-soft) infinite;
    }

    .front-halo{
      inset:9%;
      border:1px solid rgba(255,255,255,.32);
      box-shadow:0 0 80px rgba(255,213,108,.22) inset;
      opacity:.65;
      animation:haloBreathe 6.2s var(--ease-soft) infinite;
    }

    .ray-field{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      pointer-events:none;
    }

    .ray{
      position:absolute;
      left:50%;
      top:50%;
      width:24px;
      height:96px;
      margin-left:-12px;
      margin-top:-48px;
      transform-origin:50% 255px;
      border-radius:999px;
      background:linear-gradient(to bottom, var(--ray-1), var(--ray-2));
      box-shadow:
        0 0 18px rgba(255,197,53,.18),
        inset 0 8px 10px rgba(255,255,255,.22);
      opacity:.94;
      will-change:transform, opacity;
      transition:transform .5s var(--ease-soft), opacity .45s var(--ease-soft), filter .45s var(--ease-soft);
    }

    .ray::after{
      content:"";
      position:absolute;
      left:5px;
      right:5px;
      top:8px;
      height:18px;
      border-radius:999px;
      background:rgba(255,255,255,.22);
      filter:blur(1px);
    }

    .sun-shell{
      position:relative;
      width:60%;
      aspect-ratio:1/1;
      min-width:300px;
      border-radius:50%;
      display:grid;
      place-items:center;
      transform:translate3d(var(--x,0px),var(--y,0px),0) rotate(var(--r,0deg)) scale(var(--s,1));
      transition:
        transform .42s var(--ease-soft),
        filter .42s var(--ease-soft);
      will-change:transform;
      touch-action:none;
      cursor:grab;
    }

    .sun-shell.dragging{ cursor:grabbing; }

    .sun{
      position:relative;
      width:100%;
      height:100%;
      border-radius:50%;
      display:grid;
      place-items:center;
      overflow:visible;
      background:
        radial-gradient(circle at 35% 28%, #fff8cb 0%, var(--sun-1) 14%, var(--sun-2) 34%, var(--sun-3) 67%, var(--sun-4) 100%);
      box-shadow:
        inset -22px -24px 0 rgba(228,145,18,.22),
        inset 20px 18px 0 rgba(255,244,183,.30),
        0 0 0 8px rgba(255,239,170,.32),
        0 0 50px 10px var(--glow-1),
        0 0 110px 24px var(--glow-2);
      transition:
        box-shadow .45s var(--ease-soft),
        filter .45s var(--ease-soft),
        border-radius .35s var(--ease-soft);
      isolation:isolate;
    }

    .sun::before{
      content:"";
      position:absolute;
      inset:7.2%;
      border-radius:50%;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,.46), rgba(255,255,255,.07) 38%, rgba(255,255,255,0) 58%);
      mix-blend-mode:screen;
      pointer-events:none;
    }

    .sun::after{
      content:"";
      position:absolute;
      width:39%;
      height:14%;
      left:16%;
      top:18%;
      border-radius:999px;
      background:var(--white);
      filter:blur(7px);
      transform:rotate(-18deg);
      opacity:.78;
      pointer-events:none;
    }

    .inner-ring{
      position:absolute;
      inset:3.4%;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.18);
      pointer-events:none;
      opacity:.72;
    }

    .pulse-ring{
      position:absolute;
      inset:-2%;
      border-radius:50%;
      border:5px solid rgba(255,248,213,.7);
      opacity:0;
      transform:scale(.88);
      pointer-events:none;
    }

    .pulse-ring.active{
      animation:ring .75s var(--ease-soft);
    }

    .face{
      position:relative;
      width:56%;
      height:40%;
      transform:translateY(7%);
      transition:transform .28s var(--ease-soft), filter .28s var(--ease-soft);
      will-change:transform;
      z-index:2;
      pointer-events:none;
    }

    .eye, .mouth{
      position:absolute;
      border-color:var(--face);
      filter:drop-shadow(0 1px 0 rgba(255,255,255,.14));
      transition:
        transform .28s var(--ease-soft),
        top .28s var(--ease-soft),
        left .28s var(--ease-soft),
        right .28s var(--ease-soft),
        width .28s var(--ease-soft),
        height .28s var(--ease-soft),
        border-width .28s var(--ease-soft),
        opacity .28s var(--ease-soft);
      will-change:transform;
    }

    .eye{
      width:20%;
      height:20%;
      top:22%;
      border-style:solid;
      border-width:7px;
      border-top:none;
      border-left-color:transparent;
      border-right-color:transparent;
      border-bottom-width:8px;
      border-radius:0 0 999px 999px;
    }

    .eye.left{ left:14%; }
    .eye.right{ right:14%; }

    .mouth{
      width:38%;
      height:22%;
      left:31%;
      top:54%;
      border-style:solid;
      border-width:8px;
      border-top:none;
      border-left-color:transparent;
      border-right-color:transparent;
      border-bottom-width:9px;
      border-radius:0 0 999px 999px;
    }

    .cheek{
      position:absolute;
      top:58%;
      width:13%;
      height:10%;
      border-radius:50%;
      background:var(--peach);
      filter:blur(4px);
      opacity:0;
      transition:opacity .35s var(--ease-soft), transform .35s var(--ease-soft);
      pointer-events:none;
    }

    .cheek.left{ left:15%; }
    .cheek.right{ right:15%; }

    .sparkles, .dust{
      position:absolute;
      inset:-8%;
      pointer-events:none;
      overflow:visible;
    }

    .spark{
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      background:rgba(255,255,255,.96);
      box-shadow:0 0 14px rgba(255,255,255,.72);
      opacity:0;
      transform:translate(-50%, -50%) scale(.45);
      animation:spark 1.05s var(--ease-soft) forwards;
    }

    .dust-dot{
      position:absolute;
      width:4px;
      height:4px;
      border-radius:50%;
      background:rgba(255,255,255,.6);
      opacity:.45;
      animation:dust 5s linear infinite;
    }

    .pressed .sun{
      box-shadow:
        inset -24px -24px 0 rgba(228,145,18,.24),
        inset 22px 20px 0 rgba(255,244,183,.32),
        0 0 0 9px rgba(255,244,196,.45),
        0 0 80px 18px rgba(255,219,101,.62),
        0 0 140px 38px rgba(255,187,53,.30);
    }

    .happy .mouth{
      width:42%;
      left:29%;
      top:52%;
      transform:scaleY(1.18);
    }

    .happy .cheek{
      opacity:1;
      transform:scale(1.05);
    }

    .gentle .mouth{
      width:35%;
      left:32.5%;
      top:55%;
      transform:scaleY(.92);
    }

    .excited .eye{
      width:18%;
      height:16%;
      top:20%;
      transform:translateY(-2px) scaleY(1.1);
    }

    .excited .mouth{
      width:46%;
      left:27%;
      top:50%;
      transform:scaleY(1.34);
    }

    .sleepy .eye{
      height:8%;
      top:30%;
      border-bottom-width:7px;
      transform:scaleY(.8);
    }

    .sleepy .mouth{
      width:30%;
      left:35%;
      top:57%;
      transform:scaleY(.72);
    }

    .shy .eye.left{ left:16%; top:24%; transform:scaleY(.92) rotate(-4deg); }
    .shy .eye.right{ right:16%; top:24%; transform:scaleY(.92) rotate(4deg); }
    .shy .mouth{ width:31%; left:34.5%; top:56%; transform:scaleY(.82); }
    .shy .cheek{ opacity:1; transform:scale(1.18); }

    .boop .mouth{ transform:scale(.86); }
    .squish .sun{ border-radius:48% 52% 50% 50% / 52% 48% 52% 48%; }

    @keyframes backGlow{
      0%,100%{ transform:scale(1); opacity:.9; }
      50%{ transform:scale(1.065); opacity:1; }
    }

    @keyframes mistFloat{
      0%,100%{ transform:translate3d(0,0,0) scale(1); }
      50%{ transform:translate3d(6px,-8px,0) scale(1.03); }
    }

    @keyframes haloBreathe{
      0%,100%{ transform:scale(1); opacity:.56; }
      50%{ transform:scale(1.03); opacity:.84; }
    }

    @keyframes ring{
      0%{ opacity:.72; transform:scale(.85); }
      100%{ opacity:0; transform:scale(1.18); }
    }

    @keyframes spark{
      0%{ opacity:0; transform:translate(-50%,-50%) scale(.35); }
      15%{ opacity:1; }
      100%{ opacity:0; transform:translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(1.6); }
    }

    @keyframes dust{
      0%{ transform:translateY(0px) scale(.8); opacity:0; }
      15%{ opacity:.4; }
      100%{ transform:translateY(-28px) scale(1.3); opacity:0; }
    }

    @media (max-width:600px){
      .sun-shell{ min-width:270px; }
      .eye{ border-width:6px; border-bottom-width:7px; }
      .mouth{ border-width:7px; border-bottom-width:8px; }
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="back-glow"></div>
    <div class="mist"></div>
    <div class="ray-field" id="rayField"></div>
    <div class="front-halo"></div>

    <div class="sun-shell happy gentle" id="shell">
      <div class="sun" id="sun">
        <div class="inner-ring"></div>
        <div class="pulse-ring" id="ring"></div>

        <div class="face" id="face">
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="mouth"></div>
          <div class="cheek left"></div>
          <div class="cheek right"></div>
        </div>

        <div class="sparkles" id="sparkles"></div>
        <div class="dust" id="dust"></div>
      </div>
    </div>
  </div>

  <script>
    const shell = document.getElementById('shell');
    const sun = document.getElementById('sun');
    const face = document.getElementById('face');
    const ring = document.getElementById('ring');
    const sparkles = document.getElementById('sparkles');
    const dust = document.getElementById('dust');
    const rayField = document.getElementById('rayField');

    const states = ['happy','gentle','excited','sleepy','shy'];
    let activeMood = 'gentle';

    let rect = null;
    let pointerDown = false;
    let holdTimer = null;
    let moodTimer = null;
    let idleMoodTimer = null;

    const motion = {
      x:0, y:0, r:0, s:1,
      tx:0, ty:0, tr:0, ts:1
    };

    function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

    function lerp(a,b,n){ return a + (b-a)*n; }

    function refreshRect(){
      rect = shell.getBoundingClientRect();
    }
    refreshRect();
    addEventListener('resize', refreshRect);

    function setMood(name){
      states.forEach(s => shell.classList.remove(s));
      shell.classList.add(name);
      activeMood = name;
    }

    function moodCycle(){
      clearTimeout(idleMoodTimer);
      idleMoodTimer = setTimeout(()=>{
        const order = ['gentle','happy','shy','gentle','excited','gentle'];
        let i = 0;
        clearInterval(moodTimer);
        moodTimer = setInterval(()=>{
          if(pointerDown) return;
          setMood(order[i % order.length]);
          if(Math.random() < 0.55) cheekDust();
          i++;
        }, 2200);
      }, 1200);
    }

    function buildRays(){
      const count = 20;
      for(let i=0;i<count;i++){
        const ray = document.createElement('div');
        ray.className = 'ray';
        const angle = (360 / count) * i;
        const dist = 236 + Math.sin(i * 1.4) * 8;
        const len = 80 + (i % 3) * 10 + Math.sin(i * .8) * 4;
        ray.style.height = `${len}px`;
        ray.style.marginTop = `${-len/2}px`;
        ray.dataset.base = `rotate(${angle}deg) translateY(-${dist}px)`;
        ray.style.transform = ray.dataset.base;
        rayField.appendChild(ray);
      }
    }
    buildRays();

    function animateRays(nx=0, ny=0, boost=0){
      const rays = [...document.querySelectorAll('.ray')];
      const now = performance.now() / 1000;
      rays.forEach((ray, i)=>{
        const drift = Math.sin(now * 1.4 + i * .55) * 2.8 + nx * 6;
        const pulse = 1 + Math.sin(now * 2 + i * .33) * (0.025 + boost * 0.04);
        ray.style.opacity = `${0.84 + boost * .16}`;
        ray.style.filter = `drop-shadow(0 0 ${10 + boost*14}px rgba(255,197,53,.22))`;
        ray.style.transform = `${ray.dataset.base} rotate(${drift}deg) scaleY(${pulse})`;
      });
    }

    function applyMotion(){
      shell.style.setProperty('--x', `${motion.x}px`);
      shell.style.setProperty('--y', `${motion.y}px`);
      shell.style.setProperty('--r', `${motion.r}deg`);
      shell.style.setProperty('--s', `${motion.s}`);
    }

    function triggerRing(){
      ring.classList.remove('active');
      void ring.offsetWidth;
      ring.classList.add('active');
    }

    function burst(x,y,count=10,spread=32){
      const hostRect = sun.getBoundingClientRect();
      for(let i=0;i<count;i++){
        const dot = document.createElement('div');
        dot.className = 'spark';
        const localX = x - hostRect.left;
        const localY = y - hostRect.top;
        const ang = ((Math.PI * 2) / count) * i + Math.random() * .45;
        const dist = 8 + Math.random() * spread;
        dot.style.left = `${localX}px`;
        dot.style.top = `${localY}px`;
        dot.style.setProperty('--sx', `${Math.cos(ang) * dist}px`);
        dot.style.setProperty('--sy', `${Math.sin(ang) * dist}px`);
        sparkles.appendChild(dot);
        dot.addEventListener('animationend', ()=>dot.remove(), {once:true});
      }
    }

    function cheekDust(){
      const rect = sun.getBoundingClientRect();
      for(let i=0;i<10;i++){
        const d = document.createElement('div');
        d.className = 'dust-dot';
        d.style.left = `${rect.width * (.3 + Math.random() * .4)}px`;
        d.style.top = `${rect.height * (.55 + Math.random() * .2)}px`;
        d.style.animationDelay = `${Math.random() * .8}s`;
        d.style.animationDuration = `${3.6 + Math.random() * 2.2}s`;
        dust.appendChild(d);
        setTimeout(()=>d.remove(), 5500);
      }
    }

    function faceToward(clientX, clientY, pressure=0){
      refreshRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;

      const nx = clamp(dx / (rect.width * .48), -1, 1);
      const ny = clamp(dy / (rect.height * .48), -1, 1);

      motion.tx = nx * 22;
      motion.ty = ny * 20;
      motion.tr = nx * 7;
      motion.ts = 1 + Math.min(.08, (Math.abs(nx)+Math.abs(ny))*0.03 + pressure * .04);

      face.style.transform = `translate(${nx * 10}px, ${8 + ny * 9}px)`;

      const left = face.querySelector('.eye.left');
      const right = face.querySelector('.eye.right');
      const mouth = face.querySelector('.mouth');

      const eyeLift = clamp(-ny * 5, -5, 6);
      left.style.transform = `translateY(${eyeLift}px) scaleY(${1 - Math.abs(ny) * .16})`;
      right.style.transform = `translateY(${eyeLift}px) scaleY(${1 - Math.abs(ny) * .16})`;

      const smileDepth = clamp(1.02 + (-ny * .22) + pressure * .14, .78, 1.36);
      mouth.style.transform = `scaleY(${smileDepth})`;

      animateRays(nx, ny, pressure);
    }

    function resetFaceSoft(){
      motion.tx = 0;
      motion.ty = 0;
      motion.tr = 0;
      motion.ts = 1;
      face.style.transform = 'translateY(7%)';
      face.querySelector('.eye.left').style.transform = '';
      face.querySelector('.eye.right').style.transform = '';
      face.querySelector('.mouth').style.transform = '';
      setMood('gentle');
      shell.classList.remove('pressed','squish','boop');
      moodCycle();
    }

    function pressStart(e){
      pointerDown = true;
      shell.classList.add('dragging','pressed','squish','boop');
      setMood('happy');
      triggerRing();
      clearInterval(moodTimer);
      clearTimeout(idleMoodTimer);

      const p = e.touches ? e.touches[0] : e;
      burst(p.clientX, p.clientY, 12, 38);
      faceToward(p.clientX, p.clientY, .65);

      clearTimeout(holdTimer);
      holdTimer = setTimeout(()=>{
        setMood('shy');
        cheekDust();
        burst(p.clientX, p.clientY, 16, 44);
      }, 420);

      setTimeout(()=>shell.classList.remove('boop'), 160);
    }

    function pressMove(e){
      const p = e.touches ? e.touches[0] : e;
      if(pointerDown){
        faceToward(p.clientX, p.clientY, .8);
        if(Math.random() < .08) burst(p.clientX, p.clientY, 4, 16);
      } else {
        faceToward(p.clientX, p.clientY, .18);
      }
    }

    function pressEnd(){
      pointerDown = false;
      shell.classList.remove('dragging');
      clearTimeout(holdTimer);
      setTimeout(resetFaceSoft, 120);
    }

    function hoverEnter(e){
      setMood('happy');
      faceToward(e.clientX, e.clientY, .2);
    }

    function clickReact(e){
      setMood('excited');
      shell.classList.add('pressed','boop');
      triggerRing();
      burst(e.clientX, e.clientY, 15, 42);
      cheekDust();
      setTimeout(()=>shell.classList.remove('boop'), 180);
      setTimeout(()=>{
        if(!pointerDown){
          shell.classList.remove('pressed');
          setMood('happy');
        }
      }, 360);
    }

    shell.addEventListener('pointerdown', pressStart);
    window.addEventListener('pointermove', pressMove);
    window.addEventListener('pointerup', pressEnd);
    window.addEventListener('pointercancel', pressEnd);

    shell.addEventListener('touchstart', pressStart, {passive:true});
    window.addEventListener('touchmove', pressMove, {passive:true});
    window.addEventListener('touchend', pressEnd, {passive:true});
    window.addEventListener('touchcancel', pressEnd, {passive:true});

    shell.addEventListener('mouseenter', hoverEnter);
    shell.addEventListener('mousemove', pressMove);
    shell.addEventListener('mouseleave', ()=>{ if(!pointerDown) resetFaceSoft(); });
    shell.addEventListener('click', clickReact);

    let time = 0;
    function loop(){
      time += 0.016;

      motion.x = lerp(motion.x, motion.tx + Math.sin(time * 1.15) * (pointerDown ? 0 : 4), 0.09);
      motion.y = lerp(motion.y, motion.ty + Math.cos(time * 1.28) * (pointerDown ? 0 : 4), 0.09);
      motion.r = lerp(motion.r, motion.tr + Math.sin(time * 0.9) * (pointerDown ? 0 : 1.8), 0.08);
      motion.s = lerp(motion.s, motion.ts + Math.sin(time * 2.1) * (pointerDown ? 0 : 0.008), 0.09);

      applyMotion();
      animateRays(0, 0, pointerDown ? .6 : .12);

      requestAnimationFrame(loop);
    }

    applyMotion();
    moodCycle();
    loop();

    setInterval(()=>{
      if(pointerDown) return;
      if(Math.random() < .5){
        setMood(['gentle','happy','shy'][Math.floor(Math.random()*3)]);
      }
    }, 3400);
  </script>
</body>
</html>
